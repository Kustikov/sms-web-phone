<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dual iPhone SMS</title>

<meta http-equiv="refresh" content="2">

<style>
body {
    margin: 0;
    background: linear-gradient(180deg, #dfe9f3 0%, #ffffff 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    gap: 60px;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.phone {
    width: 360px;
    height: 680px;
    background: #f2f2f7;
    border-radius: 40px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border: 8px solid black;
}

.status-bar {
    height: 44px;
    background: #f9f9f9;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 15px;
    font-size: 14px;
    font-weight: 500;
}

.header {
    background: #ffffff;
    padding: 10px;
    text-align: center;
    font-weight: 600;
    border-bottom: 1px solid #ddd;
    font-size: 14px;
}

.messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

.message {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 20px;
    margin-bottom: 10px;
    font-size: 15px;
    line-height: 1.4;
    background: #e5e5ea;
    align-self: flex-start;
}

.time {
    font-size: 11px;
    color: #777;
    margin-top: 4px;
}

.footer {
    height: 30px;
    background: #ffffff;
    border-top: 1px solid #ddd;
}
</style>
</head>

<body>

<!-- PHONE 1 -->
<div class="phone">
    <div class="status-bar">
        <span>📶 LTE</span>
        <span id="time1"></span>
        <span>🔋 87%</span>
    </div>

    <div class="header">
        {{ phone1 }}
    </div>

    <div class="messages">
        {% for msg in messages[phone1] %}
        <div class="message">
            {{ msg.text }}
            <div class="time">{{ msg.time }}</div>
        </div>
        {% endfor %}
    </div>

    <div class="footer"></div>
</div>


<!-- PHONE 2 -->
<div class="phone">
    <div class="status-bar">
        <span>📶 LTE</span>
        <span id="time2"></span>
        <span>🔋 82%</span>
    </div>

    <div class="header">
        {{ phone2 }}
    </div>

    <div class="messages">
        {% for msg in messages[phone2] %}
        <div class="message">
            {{ msg.text }}
            <div class="time">{{ msg.time }}</div>
        </div>
        {% endfor %}
    </div>

    <div class="footer"></div>
</div>

<script>
function updateTime() {
    const now = new Date();
    const formatted = now.toLocaleTimeString([], {hour: '2-digit', minute: '2-digit'});
    document.getElementById("time1").innerText = formatted;
    document.getElementById("time2").innerText = formatted;
}
setInterval(updateTime, 1000);
updateTime();
</script>

</body>
</html>
